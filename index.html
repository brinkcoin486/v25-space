<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V25 FUSION REAL NETWORK</title>

<style>
body{
  margin:0;
  background:#050b12;
  color:#00ffcc;
  font-family:monospace;
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:20px;
  border-bottom:1px solid #00ffcc;
}

/* LAYOUT */
#layout{
  display:grid;
  grid-template-columns:260px 1fr;
  height:calc(100vh - 60px);
}

/* SIDEBAR */
#sidebar{
  border-right:1px solid #00ffcc;
  padding:10px;
}

button{
  width:100%;
  margin:5px 0;
  padding:10px;
  background:#00ffcc;
  border:none;
  cursor:pointer;
}

/* MAIN */
#main{
  display:flex;
  flex-direction:column;
}

/* CHAT */
#chat{
  flex:1;
  overflow:auto;
  padding:10px;
}

.msg{
  margin:6px 0;
  padding:8px;
  border-left:3px solid #00ffcc;
}
.user{border-color:#ffe600}

/* TERMINAL */
#terminal{
  height:120px;
  overflow:auto;
  padding:10px;
  border-top:1px solid #00ffcc;
  background:#000;
  font-size:12px;
}

/* INPUT */
#inputZone{
  display:flex;
}

#input{
  flex:1;
  padding:10px;
}

</style>
</head>

<body>

<header>🚀 V25 FUSION – MULTI IA NETWORK</header>

<div id="layout">

<!-- SIDEBAR -->
<div id="sidebar">
  <button onclick="runScenario()">▶ LANCER IA</button>
  <button onclick="clearChat()">🧹 CLEAR</button>
</div>

<!-- MAIN -->
<div id="main">

<div id="chat"></div>

<div id="inputZone">
  <input id="input" placeholder="Écris...">
  <button onclick="send()">SEND</button>
</div>

<div id="terminal"></div>

</div>
</div>

<script>

const chat = document.getElementById("chat");
const terminal = document.getElementById("terminal");

//////////////////////////////////////////////////
// AFFICHAGE GARANTI
//////////////////////////////////////////////////

function addMsg(name,text,type="ia"){
  const div=document.createElement("div");
  div.className="msg "+(type==="user"?"user":"");
  div.innerHTML="<b>"+name+"</b> : "+text;
  chat.appendChild(div);
  chat.scrollTop=chat.scrollHeight;
}

function log(text){
  terminal.innerHTML += text+"<br>";
  terminal.scrollTop = terminal.scrollHeight;
}

//////////////////////////////////////////////////
// USER
//////////////////////////////////////////////////

function send(){
  const val=document.getElementById("input").value;
  if(!val)return;

  addMsg("USER",val,"user");
  log("[USER] "+val);

  // réponse IA simple (toujours visible)
  setTimeout(()=>{
    addMsg("IA","Analyse de : "+val);
  },400);

  document.getElementById("input").value="";
}

function clearChat(){
  chat.innerHTML="";
}

//////////////////////////////////////////////////
// MULTI AGENT (fusion V2)
//////////////////////////////////////////////////

function runScenario(){

  const task = document.getElementById("input").value || "Analyse stratégique";

  addMsg("SYSTEM","Démarrage réseau IA...");
  log("[BOOT] Scenario start");

  // ANALYSTE
  setTimeout(()=>{
    addMsg("ANALYSTE","Analyse : "+task);
    log("[ANALYST] OK");
  },500);

  // CRITIQUE
  setTimeout(()=>{
    addMsg("CRITIQUE","Failles détectées sur "+task);
    log("[CRITIC] OK");
  },1000);

  // SYNTHÈSE
  setTimeout(()=>{
    addMsg("SYNTHÈSE","Solution optimisée générée");
    log("[SYNTH] OK");
  },1500);

  // JUGE
  setTimeout(()=>{
    addMsg("JUGE","Décision validée");
    log("[JUDGE] OK");
  },2000);

}

//////////////////////////////////////////////////
// BOOT
//////////////////////////////////////////////////

addMsg("SYSTEM","V25 READY – FUSION ACTIVE");
log("[SYSTEM] ONLINE");

</script>

</body>
</html>
