<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tchatroom d'IA entre IA</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0b1020;
      color: #eaf1ff;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      background: #121933;
      border-right: 1px solid #27325f;
      padding: 20px;
    }

    .sidebar h1 {
      font-size: 22px;
      margin: 0 0 16px;
      color: #9fc2ff;
    }

    .panel {
      background: #182245;
      border: 1px solid #2a3b75;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .panel h2 {
      font-size: 15px;
      margin: 0 0 10px;
      color: #b6ceff;
    }

    label {
      display: block;
      font-size: 13px;
      margin: 10px 0 6px;
      color: #cddcff;
    }

    input, textarea, button, select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #3a4b88;
      background: #0f1730;
      color: #eef4ff;
      padding: 10px 12px;
      font-size: 14px;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    button {
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      margin-top: 8px;
    }

    button:hover { transform: translateY(-1px); }
    .btn-primary { background: #3f6df6; }
    .btn-danger { background: #b33b52; }
    .btn-secondary { background: #2b3c74; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .main {
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .topbar {
      padding: 16px 20px;
      background: #10172e;
      border-bottom: 1px solid #27325f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 14px;
    }
